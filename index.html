<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Furnace</title>
  <meta name="description" content="Furnace is a terminal-first agentic coding harness with local sessions, typed tools, and permission gates.">
  <meta property="og:title" content="Furnace">
  <meta property="og:description" content="A terminal-first agentic coding harness. Built in the open, run it in your repository.">
  <link rel="icon" type="image/svg+xml" href="/furnace-wordmark.svg">
  <!-- Preload all fonts -->
  <link rel="preload" href="/fonts/DepartureMono-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/LibreBaskerville-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/LibreBaskerville-Regular-ext.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/LibreBaskerville-Italic.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/LibreBaskerville-Italic-ext.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/GeistMono-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/GeistMono-Regular-ext.woff2" as="font" type="font/woff2" crossorigin>
  <!-- Preload assets -->
  <link rel="preload" href="/paper.png" as="image">
  <link rel="preload" href="/normal-map.png" as="image">
  <link rel="preload" href="/shader.js" as="script">
  <!-- Self-hosted font stylesheets -->
  <link rel="stylesheet" href="/fonts/departure-mono.css">
  <link rel="stylesheet" href="/fonts/libre-baskerville.css">
  <link rel="stylesheet" href="/fonts/geist-mono.css">
</head>
<body>
  <script>
    (function () {
      const THEME_KEY = 'furnace-theme';
      let isNight = true;
      try { isNight = localStorage.getItem(THEME_KEY) !== 'day'; } catch {}
      document.documentElement.classList.toggle('theme-night', isNight);
      document.body.classList.toggle('theme-night', isNight);
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
